<!DOCTYPE html>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>body{margin:0;padding:20px;background:var(--bg)}.wrap{display:grid;gap:12px;max-width:640px}.dots{display:flex;gap:20px;align-items:center}</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { Notice, ProgressBar, StatusDot, Spinner } = window.LumenDesignSystem_2ccddc;
function Demo() {
  return (
    <div className="wrap">
      <Notice tone="success">Transcript exported to SRT.</Notice>
      <Notice tone="warn" title="Accessibility not granted">Lumen will copy to the clipboard instead of pasting into the focused app.</Notice>
      <ProgressBar value={62} label="Transcribing" />
      <ProgressBar label="Preparing SenseVoice model…" />
      <div className="dots">
        <StatusDot status="running" label="Transcribing" />
        <StatusDot status="done" label="Ready" />
        <StatusDot status="failed" label="Error" />
        <span style={{color:"var(--accent)"}}><Spinner /></span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
